# fly.toml app configuration file generated for ticketflow on 2026-05-19T07:41:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ticketflow'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
